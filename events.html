<!DOCTYPE html>
<html>
<head>
    <title>Formats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Select Format</h1>
</header>

<section class="dashboard">
    <div class="card" onclick="openFormat('ODI')">ODI</div>
    <div class="card" onclick="openFormat('T20')">T20</div>
    <div class="card" onclick="openFormat('Test')">Test</div>
    <div class="card" onclick="openFormat('Champions Trophy')">Champions Trophy</div>
</section>

<script>
const team = localStorage.getItem("team");
const type = localStorage.getItem("type");


function openFormat(format){
    localStorage.setItem("format", format);
    window.location.href = "performance.html";
}
</script>

</body>
</html>
