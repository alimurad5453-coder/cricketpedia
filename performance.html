<!DOCTYPE html>
<html>
<head>
    <title>Performance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1 id="title">Loading...</h1>
</header>

<section class="dashboard" id="performanceBox"></section>

<script src="data.js"></script>

<script>
const team = localStorage.getItem("team");
const type = localStorage.getItem("type");
const format = localStorage.getItem("format");

if(!team || !type || !format){
    document.getElementById("title").innerText = "Missing Data";
    document.getElementById("performanceBox").innerHTML =
        "<div class='card'>Please complete selection flow</div>";
} else {
    document.getElementById("title").innerText =
        team + " | " + type + " | " + format;

    if(typeof showPerformance === "function"){
        showPerformance(team, type, format);
    } else {
        document.getElementById("performanceBox").innerHTML =
            "<div class='card'>Data function missing</div>";
    }
}
</script>

</body>
</html>
